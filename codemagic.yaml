workflows:
  android-debug:
    name: Build APK with Docker
    instance_type: mac_mini_m1
    scripts:
      - name: Build in Docker Container
        script: |
          # نستخدم حاوية جاهزة تحتوي على أدوات الأندرويد والـ p4a
          # هذه الطريقة تتخطى مشاكل التثبيت والبيئة الأساسية
          docker run --rm -v $(pwd):/app -w /app \
            kivy/buildozer:latest \
            bash -c "pip install --upgrade pip && \
                     pip install cython==0.29.33 python-for-android && \
                     p4a apk --private ./ \
                     --package com.soccerstars.analyzer \
                     --name 'Soccer Stars Analyzer' \
                     --bootstrap sdl2 \
                     --requirements python3,kivy,numpy==1.26.4,opencv-python-headless==4.6.0.66,pyjnius \
                     --entrypoint service/main.py \
                     --arch arm64-v8a \
                     --android-api 33"
    artifacts:
      - "*.apk"
