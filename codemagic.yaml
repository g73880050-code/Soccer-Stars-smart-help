workflows:
  android-debug:
    name: Final Build
    instance_type: mac_mini_m1
    scripts:
      - name: Setup and Build
        script: |
          # 1. تثبيت المتطلبات الأساسية
          brew install autoconf automake libtool pkg-config
          pip3 install --upgrade pip
          pip3 install cython==0.29.33 python-for-android numpy==1.26.4
          
          # 2. إجبار البيئة على تخطي كل الفحوصات التفاعلية
          export P4A_FORCE_YES=1
          export P4A_NO_PREREQUISITE_CHECK=1
          
          # 3. توجيه البناء إلى المسارات الصحيحة
          # ملاحظة: في Codemagic، الـ SDK يكون موجوداً في $ANDROID_SDK_ROOT
          export ANDROID_HOME=$ANDROID_SDK_ROOT
          
          # 4. بناء الـ APK
          python3 -m pythonforandroid.toolchain apk --private ./ \
            --package com.soccerstars.analyzer \
            --name "Soccer Stars Analyzer" \
            --bootstrap sdl2 \
            --requirements python3,kivy,numpy==1.26.4,pyjnius \
            --entrypoint service/main.py \
            --arch arm64-v8a \
            --android-api 33 \
            --ndk-api 21 \
            --release --force --no-update
    artifacts:
      - "*.apk"

