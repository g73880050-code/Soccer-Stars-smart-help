workflows:
  android-debug:
    name: Build with Docker
    instance_type: mac_mini_m1
    environment:
      docker: true
    scripts:
      - name: Build APK
        script: |
          # 1. بناء صورة الدوكير (سوف يقوم هذا الأمر بتنفيذ pip install -r requirements.txt)
          docker build -t soccer-builder .
          
          # 2. تشغيل الحاوية وتنفيذ أمر p4a
          # قمنا بإزالة قائمة المكتبات الطويلة من هنا واكتفينا بالاعتماد على ما تم تثبيته داخل الدوكير
          docker run --rm -v $(pwd):/app soccer-builder \
            p4a apk --private /app \
              --package com.soccerstars.analyzer \
              --name "Soccer Stars Analyzer" \
              --bootstrap sdl2 \
              --requirements python3,kivy,numpy,opencv-python-headless,pyjnius \
              --arch arm64-v8a \
              --android-api 33
    artifacts:
      - "*.apk"
