workflows:
  android-debug:
    name: Advanced Wheels Build
    instance_type: mac_mini_m1
    scripts:
      - name: Full Clean & Build
        script: |
          # 1. تنظيف جذري لكل المخلفات القديمة
          rm -rf ./build ./.python-for-android ./dist
          
          # 2. تحديث الأدوات الأساسية فقط
          brew update
          brew install automake libtool opencv
          pip3 install --upgrade pip setuptools wheel cython==0.29.33
          pip3 install python-for-android
          
          # 3. إعداد البيئة النظيفة
          export P4A_FORCE_YES=1
          export P4A_NO_PREREQUISITE_CHECK=1
          
          # 4. بناء الـ APK بأمر واحد مباشر وبدون تعقيدات العزل
          python3 -m pythonforandroid.toolchain apk --private ./ \
            --package com.soccerstars.analyzer \
            --name "Soccer Stars Analyzer" \
            --bootstrap sdl2 \
            --requirements python3,kivy,pyjnius \
            --arch arm64-v8a \
            --android-api 33 \
            --release --force
    artifacts:
      - "*.apk"
