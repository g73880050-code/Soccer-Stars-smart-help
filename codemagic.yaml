workflows:
  android-debug:
    name: Build APK - Final Fix
    instance_type: mac_mini_m1
    scripts:
      - name: Build APK
        script: |
          # إجبار p4a على عدم طلب أي شيء تفاعلي
          export P4A_FORCE_YES=1
          export P4A_NO_PREREQUISITE_CHECK=1
          
          # تثبيت المكتبات الأساسية
          pip3 install --upgrade pip
          pip3 install cython==0.29.33 python-for-android numpy==1.26.4 pyjnius
          
          # البناء باستخدام المسار المباشر للـ SDK الموجود في سيرفر الماك
          python3 -m pythonforandroid.toolchain apk --private ./ \
            --package com.soccerstars.analyzer \
            --name "Soccer Stars Analyzer" \
            --bootstrap sdl2 \
            --requirements python3,kivy,numpy==1.26.4,pyjnius \
            --entrypoint service/main.py \
            --arch arm64-v8a \
            --android-api 33 --release --force --no-update
    artifacts:
      - "*.apk"

