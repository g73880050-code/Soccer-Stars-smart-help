workflows:
  android-debug:
    name: Final Stable Build
    instance_type: mac_mini_m1
    scripts:
      - name: Install System Dependencies
        script: |
          # تثبيت المتطلبات النظامية يدوياً بدون تفاعل
          brew install autoconf automake libtool pkg-config
      - name: Build APK
        script: |
          # متغيرات البيئة لمنع أي تساؤلات من الأداة
          export P4A_FORCE_YES=1
          export P4A_NO_PREREQUISITE_CHECK=1
          
          # تثبيت المكتبات المطلوبة
          pip3 install --upgrade pip
          pip3 install cython==0.29.33 python-for-android numpy==1.26.4 pyjnius
          
          # البناء مباشرة باستخدام python3 -m لضمان استخدام بيئة بايثون المجهزة
          python3 -m pythonforandroid.toolchain apk --private ./ \
            --package com.soccerstars.analyzer \
            --name "Soccer Stars Analyzer" \
            --bootstrap sdl2 \
            --requirements python3,kivy,numpy==1.26.4,pyjnius \
            --entrypoint service/main.py \
            --arch arm64-v8a \
            --android-api 33 --release --force --no-update
    artifacts:
      - "*.apk"
