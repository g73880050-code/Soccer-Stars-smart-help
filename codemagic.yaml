workflows:
  android-debug:
    name: Advanced Wheels Build
    instance_type: mac_mini_m1
    scripts:
      - name: Setup System & P4A
        script: |
          # 1. تثبيت الأدوات الأساسية
          pip3 install --upgrade pip
          pip3 install cython==0.29.33 python-for-android
          
          # 2. تحميل ملف OpenCV الجاهز مباشرة إلى السيرفر وتخطي قيد الـ 25 ميجا
          mkdir -p ./wheels
          curl -L "https://files.pythonhosted.org/packages/43/ab/a24e03f0b094b8e559092490df1efbfa0ba00fc9dca02dfbb88647cbfdc6/opencv_python_headless-4.9.0.80-cp37-abi3-manylinux_2_17_aarch64.manylinux2014_aarch64.whl" -o ./wheels/opencv_python_headless-4.9.0.80-cp37-abi3-manylinux_2_17_aarch64.whl
          
          # 3. متغيرات بيئة لمنع الأسئلة وتحديد مجلد الـ Wheels
          export P4A_FORCE_YES=1
          export P4A_NO_PREREQUISITE_CHECK=1
          export P4A_WHEELS_DIR=./wheels
          
          # 4. أمر البناء الخارق
          python3 -m pythonforandroid.toolchain apk --private ./ \
            --package com.soccerstars.analyzer \
            --name "Soccer Stars Analyzer" \
            --bootstrap sdl2 \
            --requirements python3,kivy,numpy==1.26.4,opencv-python-headless==4.9.0.80,pyjnius \
            --entrypoint service/main.py \
            --arch arm64-v8a \
            --android-api 33 \
            --release --force --no-update
    artifacts:
      - "*.apk"

