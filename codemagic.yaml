workflows:
  android-debug:
    name: Build APK with Docker on Mac
    instance_type: mac_mini_m1
    scripts:
      - name: Install and Start Docker
        script: |
          # تثبيت Docker Desktop
          brew install --cask docker
          
          # تشغيل محرك الدوكر مباشرة بدون فتح التطبيق الرسومي
          # المسار التالي هو المسار المباشر للمحرك داخل التطبيق
          /Applications/Docker.app/Contents/MacOS/Docker --unattended --quiet &
          
          # انتظار تفعيل المحرك (Daemon) - سننتظر حتى يستجيب الأمر docker info
          echo "Waiting for Docker to start..."
          until docker info > /dev/null 2>&1; do 
            sleep 5
            echo "Still waiting for Docker..."
          done
          echo "Docker is running!"
          
      - name: Build and Package
        script: |
          # بناء الصورة
          docker build -t soccer-p4a-builder .
          
          # تشغيل الحاوية
          docker run --rm -v $(pwd):/workspace soccer-p4a-builder \
            /bin/bash -c "yes | sdkmanager --licenses > /dev/null && \
            p4a apk --private /workspace \
              --package com.soccerstars.analyzer \
              --name 'Soccer Stars Analyzer' \
              --bootstrap sdl2 \
              --requirements python3,kivy,numpy,opencv-python-headless,pyjnius \
              --entrypoint /workspace/service/main.py \
              --arch arm64-v8a \
              --android-api 33"
    artifacts:
      - "*.apk"
