workflows:
  android-debug:
    name: Build APK - Final Solution
    instance_type: mac_mini_m1
    scripts:
      - name: Install Dependencies
        script: |
          brew install autoconf automake libtool pkg-config
          pip3 install --upgrade pip
          pip3 install cython==0.29.33 python-for-android numpy==1.26.4
      - name: Build APK
        script: |
          # المتغير السحري لتجاوز الفحص التفاعلي
          export P4A_NO_PREREQUISITE_CHECK=1
          export P4A_FORCE_YES=1
          
          # مسارات الأندرويد لـ Codemagic
          export ANDROID_HOME=/usr/local/opt/android-commandlinetools
          export PATH=$PATH:$ANDROID_HOME/bin
          
          # البناء المباشر
          python3 -m pythonforandroid.toolchain apk --private ./ \
            --package com.soccerstars.analyzer \
            --name "Soccer Stars Analyzer" \
            --bootstrap sdl2 \
            --requirements python3,kivy,numpy==1.26.4,pyjnius \
            --entrypoint service/main.py \
            --arch arm64-v8a \
            --android-api 33 --release --force --no-update
    artifacts:
      - "*.apk"
