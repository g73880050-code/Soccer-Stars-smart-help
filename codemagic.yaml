workflows:
  android-debug:
    name: Build APK - Path Fixed
    instance_type: mac_mini_m1
    scripts:
      - name: Install and Setup Android SDK
        script: |
          # 1. تثبيت أدوات الأندرويد
          brew install --cask android-commandlinetools
          
          # 2. تحديد مسار الـ SDK الذي يستخدمه Mac في Codemagic
          # المسار الافتراضي لـ brew على الماك هو /usr/local/opt/android-commandlinetools
          export ANDROID_HOME=/usr/local/opt/android-commandlinetools
          export PATH=$PATH:$ANDROID_HOME/bin
          
          # 3. قبول التراخيص (ضروري جداً)
          yes | sdkmanager --licenses
          
      - name: Build APK
        script: |
          export P4A_FORCE_YES=1
          export ANDROID_HOME=/usr/local/opt/android-commandlinetools
          
          # تثبيت المكتبات
          pip3 install --upgrade pip
          pip3 install cython==0.29.33 python-for-android numpy==1.26.4
          
          # البناء
          python3 -m pythonforandroid.toolchain apk --private ./ \
            --package com.soccerstars.analyzer \
            --name "Soccer Stars Analyzer" \
            --bootstrap sdl2 \
            --requirements python3,kivy,numpy==1.26.4,pyjnius \
            --entrypoint service/main.py \
            --arch arm64-v8a \
            --android-api 33 --release --force --no-update
    artifacts:
      - "*.apk"
